<h1 id="resp">RESP<a aria-hidden="true" class="anchor-heading icon-link" href="#resp"></a></h1>
<p>While you can open a plan for a child, you can also name yourself or another adult as the beneficiary.</p>
<ul>
<li>An RESP allows adults to earn interest on their RESP tax-free.</li>
</ul>
<p>RESP investments are not subject to capital gains tax</p>
